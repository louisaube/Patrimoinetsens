# =============================================================================
# Configuration du pipeline Gallica → RAG
# Bulletins de la Société Archéologique de Sens (SAS)
# 38 volumes numérisés sur Gallica (1846-1937)
# =============================================================================

# Clé API Mistral OCR (à renseigner dans .env)
# MISTRAL_API_KEY=xxx

# Modèle OCR
ocr:
  provider: mistral
  model: mistral-ocr-latest
  batch: true  # 2000 pages/$ en batch vs 1000 pages/$ en temps réel

# Modèle pour la génération de contributions
generation:
  provider: anthropic
  model: claude-sonnet-4-20250514
  reading_level: "collège/lycée (11-18 ans)"
  language: "fr"

# Embedding pour le RAG
embedding:
  provider: openai
  model: text-embedding-3-small
  dimensions: 1536

# Stockage vectoriel
vector_store:
  provider: chromadb  # local pour dev, pgvector (Supabase) pour prod
  collection: sas_bulletins

# Chunking
chunking:
  strategy: semantic  # semantic | fixed | paragraph
  max_tokens: 800
  overlap_tokens: 100

# Bulletins SAS disponibles sur Gallica
# Format: année → ARK identifier
bulletins:
