# =============================================================================
# Armorial historique de l'Yonne — Aristide Déy, 1863
# 221 pages, blasons des familles nobles du département avant 1789
# =============================================================================
armorial:
  # 3 couches d'armoriaux à fusionner dans l'annuaire
  sources:
    # 1. Armorial d'Hozier 1696 — manuscrit enluminé officiel
    #    Généralité de Paris → élection de Sens
    #    BnF ms. Français 32250-32252 (volumes Paris)
    hozier:
      title: "Armorial général de France — Généralité de Paris"
      author: "Charles d'Hozier"
      year: 1696
      gallica_arks:
        - bpt6k75545z     # Vol. 2 Paris
        - bpt6k923004     # Vol. 3 Paris
        - bpt6k92301g     # Vol. 4 Paris
      note: "Manuscrit enluminé avec blasons peints. Chercher 'Sens' et 'Sénonais' dans les tables."

    # 2. Armorial Déy 1863 — armorial historique imprimé
    dey:
      title: "Armorial historique de l'Yonne"
      author: "Aristide Déy"
      year: 1863
      pages: 221
      gallica_ark: bpt6k54082694
      pdf_mirror: "http://echo.auxerre.free.fr/dossier_telechargement/1862_Armorial_Yonne.pdf"

    # 3. Armorial moderne des communes
    communes:
      source: "https://armorialdefrance.fr/departement_communes.php?dept=89"
      note: "Blasons actuels des communes de l'Yonne — données structurées à scraper"

  # OCR : RolmOCR (Qwen2.5-VL) pour le texte + vision AI pour les blasons peints
  ocr_model: rolmocr  # open source, Apache 2.0, SotA sur docs historiques
  vision_model: qwen3-vl  # pour isoler et décrire les blasons peints (Hozier)

